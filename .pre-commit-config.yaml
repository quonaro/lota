default_stages: [ pre-commit ]
fail_fast: false

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
    exclude: ^lota\.yml$
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: mixed-line-ending

- repo: local
  hooks:
  - id: go-fmt
    name: go fmt
    entry: gofmt
    language: system
    args: [ -w, -s ]
    types: [ go ]
    description: Format Go code with gofmt

  - id: go-vet
    name: go vet
    entry: go vet ./...
    language: system
    pass_filenames: false
    description: Run go vet

  - id: go-test
    name: go test
    entry: go test -race ./...
    language: system
    pass_filenames: false
    description: Run Go tests with race detector

  - id: golangci-lint
    name: golangci-lint
    entry: golangci-lint run
    language: system
    pass_filenames: false
    description: Run golangci-lint

- repo: local
  hooks:
  - id: cog-check
    name: cog check
    entry: cog check --check-armored
    language: system
    stages: [ commit-msg ]
    description: Check commit message with Conventional Commits
