name: Lota Set Version

on:
  workflow_run:
    workflows: ["Lota CI & Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.9.0 or v1.9.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  auto_set_version:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Checkout commit as main branch
        run: git checkout -B main ${{ github.event.workflow_run.head_sha }}

      - name: Auto bump tag
        id: bump
        uses: cocogitto/cocogitto-action@v3
        with:
          check: false
          release: true
          git-user: github-actions[bot]
          git-user-email: github-actions[bot]@users.noreply.github.com

      - name: Sync Version constant for auto release
        if: ${{ steps.bump.outputs.version != '' }}
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          sed -E -i 's|^var Version = "[^"]*"$|var Version = "'"${VERSION}"'"|' shared/constants.go
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shared/constants.go
          if git diff --cached --quiet; then
            echo "shared/constants.go is already up to date"
          else
            git commit -m "chore(version): sync shared version to ${VERSION} [skip ci]"
            git push origin HEAD:main
          fi

      - name: No release needed
        if: ${{ steps.bump.outputs.version == '' }}
        run: echo "No conventional commits requiring a new release tag"

  manual_set_version:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Create and push tag
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${INPUT_VERSION}"
          if [[ "${VERSION}" != v* ]]; then
            VERSION="v${VERSION}"
          fi

          PLAIN_VERSION="${VERSION#v}"

          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists"
            exit 1
          fi

          sed -E -i 's|^var Version = "[^"]*"$|var Version = "'"${PLAIN_VERSION}"'"|' shared/constants.go
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shared/constants.go
          if git diff --cached --quiet; then
            echo "shared/constants.go is already up to date"
          else
            git commit -m "chore(version): sync shared version to ${PLAIN_VERSION} [skip ci]"
            git push origin HEAD:main
          fi

          git tag "${VERSION}" HEAD
          git push origin "${VERSION}"
