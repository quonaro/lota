name: Auto Bump Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.COCOGITTO_TOKEN }}

      - name: Auto bump tag
        id: bump
        uses: cocogitto/cocogitto-action@v3
        with:
          check: false
          release: true
          git-user: github-actions[bot]
          git-user-email: github-actions[bot]@users.noreply.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.COCOGITTO_TOKEN }}

      - name: No release needed
        if: ${{ steps.bump.outputs.version == '' }}
        run: echo "No conventional commits requiring a new release tag"
