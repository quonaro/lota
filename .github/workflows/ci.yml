name: Lota CI & Release

on:
  push:
    branches: [ main, master ]
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  lint:
    if: !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: go vet
      run: go vet ./...

  test:
    if: !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: Download dependencies
      run: go mod download
    - name: Verify modules
      run: go mod verify
    - name: Run tests
      run: go test -race ./...

  build:
    if: !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: Build
      run: go build -v ./...

  release-build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: Build release binaries
      run: ./scripts/build.sh
    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: dist
        path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-build
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v6
      with:
        name: dist
        path: dist/
    - name: Generate checksums
      run: |
        cd dist
        sha256sum * > checksums.txt
        cat checksums.txt
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
